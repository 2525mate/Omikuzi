<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏮おみくじ🏮</title>
    <style>
        :root { --primary-color: #e63946; --bg-color: #f8f9fa; --success-color: #28a745; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; padding: 20px; background-color: var(--bg-color); color: #333; }
        .container { background: white; padding: 40px 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: 40px auto; }
        h2 { color: var(--primary-color); margin-top: 0; font-size: 1.8rem; letter-spacing: 2px; }
        .input-group { text-align: left; margin-bottom: 20px; }
        label { font-size: 0.85rem; font-weight: bold; color: #666; display: block; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #eee; box-sizing: border-box; font-size: 1.1rem; outline: none; transition: border 0.3s; }
        input:focus { border-color: var(--primary-color); }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background-color: var(--primary-color); color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: transform 0.1s, background 0.3s; }
        button:hover { background-color: #d62839; }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #ccc; cursor: not-allowed; transform: none; }
        #result { margin-top: 30px; font-size: 1.8rem; font-weight: bold; min-height: 2.5rem; }
        #timerText { margin-top: 15px; font-size: 0.9rem; font-weight: bold; min-height: 1.2rem; }
        .footer { margin-top: 20px; font-size: 0.7rem; color: #bbb; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏮 おみくじ 🏮</h2>
    
    <div class="input-group">
        <label>お名前</label>
        <input type="text" id="userName" placeholder="名前を入力してください" maxlength="15">
    </div>

    <button id="drawBtn" onclick="drawOmikuji()">運勢を占う</button>
    
    <div id="result"></div>
    <div id="timerText"></div>
    
    <div class="footer">12時間に1回引くことができます</div>
</div>

<script>
    // --- 【設定】あなたのGASウェブアプリURLをここに貼る ---
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbz4Cg-5IKlqkhlfT4NF8cSNqmCfStfezfyb0IMnmO4Z486hIjfdoWPIYsWyqS334AxMHw/exec";
    const COOLDOWN_MS = 12 * 60 * 60 * 1000;

    window.onload = () => {
        const savedName = localStorage.getItem('omikuji_name');
        if (savedName) document.getElementById('userName').value = savedName;
        
        // カウントダウン表示の開始
        startCountdown();
    };

    function startCountdown() {
        updateTimerDisplay();
        setInterval(updateTimerDisplay, 1000); // 1秒ごとに更新
    }

    function updateTimerDisplay() {
        const lastDraw = localStorage.getItem('omikuji_last_time');
        const btn = document.getElementById('drawBtn');
        const timerText = document.getElementById('timerText');

        if (!lastDraw) {
            btn.disabled = false;
            timerText.innerText = "✨ 今すぐ引けます！";
            timerText.style.color = "#28a745";
            return;
        }

        const now = new Date().getTime();
        const diff = now - parseInt(lastDraw);

        if (diff < COOLDOWN_MS) {
            btn.disabled = true;
            const remain = COOLDOWN_MS - diff;
            const hours = Math.floor(remain / (1000 * 60 * 60));
            const minutes = Math.floor((remain % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((remain % (1000 * 60)) / 1000);
            
            timerText.innerText = `⏳ 残り ${hours}時間 ${minutes}分 ${seconds}秒`;
            timerText.style.color = "#e63946";
        } else {
            btn.disabled = false;
            timerText.innerText = "✨ 再び引けるようになりました！";
            timerText.style.color = "#28a745";
        }
    }

    async function drawOmikuji() {
        const nameInput = document.getElementById('userName');
        const name = nameInput.value.trim();
        if (!name) return alert("お名前を教えてください！");

        const fortunes = ["大吉", "中吉", "小吉", "吉", "末吉", "凶"];
        const result = fortunes[Math.floor(Math.random() * fortunes.length)];

        const resultDiv = document.getElementById('result');
        const btn = document.getElementById('drawBtn');

        resultDiv.innerText = "祈祷中...";
        btn.disabled = true;

        try {
            // GASへ送信
            await fetch(GAS_API_URL, {
                method: "POST",
                body: JSON.stringify({ name: name, result: result })
            });
            
            // 成功したら表示と保存
            resultDiv.innerHTML = `結果：<span style="color:#e63946">${result}</span>`;
            localStorage.setItem('omikuji_name', name);
            localStorage.setItem('omikuji_last_time', new Date().getTime().toString());
            
            updateTimerDisplay();
        } catch (e) {
            alert("通信エラーが発生しました。");
            btn.disabled = false;
            resultDiv.innerText = "";
        }
    }
</script>
    <!-- リンク表示エリア -->
<div class="banner-container">
    <p class="banner-title">＼ にこめいとの活動をチェック！ ／</p>
    
    <!-- YouTubeリンク（画像やテキストは自由に変えてください） -->
    <a href="https://www.youtube.com/channel/UCarDivFYLQgs9G_BQtwuopw" target="_blank" rel="noopener" class="banner-link youtube-btn">
        <span>📺 YouTubeチャンネル</span>
    </a>

    <!-- LINEスタンプリンク -->
    <a href="https://line.me/S/shop/sticker/author/5326084/top?lang=ja&utm_source=gnsh_staut" target="_blank" rel="noopener" class="banner-link line-btn">
        <span>💬 LINEスタンプはこちら</span>
    </a>
</div>

<!-- 見た目を整えるためのデザイン（CSS） -->
<style>

    margin-top: 40px;
    padding: 20px;
    border-top: 2px dashed #ccc;
    text-align: center;
    font-family: sans-serif;
}
.banner-title {
    font-weight: bold;
    color: #333;
    margin-bottom: 15px;
}

    display: inline-block;

    color: #fff;
    text-decoration: none;

    box-shadow: 0 4px 6px rgba(0,0,0,0.1);

.banner-link:hover {

}

</style>
</body>
</html>
