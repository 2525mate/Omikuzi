<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>おみくじApp</title>
    <style>
        :root { --primary-color: #e63946; --bg-color: #f4f4f4; }
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: var(--bg-color); color: #333; user-select: none; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: 40px auto; }
        h2 { color: var(--primary-color); cursor: default; margin-bottom: 20px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 0.8rem; font-weight: bold; color: #666; }
        input, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1rem; }
        button { background-color: var(--primary-color); color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #result { margin-top: 25px; font-size: 1.5rem; font-weight: bold; min-height: 1.5rem; }
        #timerText { margin-top: 10px; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <!-- タイトルを5回タップでリセット発動 -->
    <h2 onclick="handleSecretTap()">🏮 おみくじ 🏮</h2>
    
    <div class="input-group">
        <label>お名前</label>
        <input type="text" id="userName" placeholder="名前を入力してください">
    </div>

    <button id="drawBtn" onclick="drawOmikuji()">おみくじを引く</button>
    
    <div id="result"></div>
    <p id="timerText"></p>
</div>

<script>
    const COOLDOWN_MS = 12 * 60 * 60 * 1000; // 12時間
    let tapCount = 0;
    let tapTimer;

    window.onload = () => {
        const savedName = localStorage.getItem('omikuji_name');
        if (savedName) document.getElementById('userName').value = savedName;
        checkCooldown();
        setInterval(checkCooldown, 60000); // 1分ごとに更新
    };

    // 1. クールダウン確認
    function checkCooldown() {
        const lastDraw = localStorage.getItem('omikuji_last_time');
        const drawBtn = document.getElementById('drawBtn');
        const timerText = document.getElementById('timerText');

        if (lastDraw) {
            const diff = new Date().getTime() - parseInt(lastDraw);
            if (diff < COOLDOWN_MS) {
                drawBtn.disabled = true;
                const remain = COOLDOWN_MS - diff;
                const h = Math.floor(remain / 3600000);
                const m = Math.floor((remain % 3600000) / 60000);
                timerText.innerText = `次まであと ${h}時間 ${m}分`;
                return false;
            }
        }
        drawBtn.disabled = false;
        timerText.innerText = "今なら引けます！";
        return true;
    }

    // 2. おみくじ実行
    async function drawOmikuji() {
        const name = document.getElementById('userName').value.trim();
        if (!name) return alert("名前を入力してください");

        // 初回設定チェック（Webhook & パスワード）
        let webhookUrl = localStorage.getItem('omikuji_webhook_url');
        let adminPass = localStorage.getItem('omikuji_admin_pass');

        if (!webhookUrl || !adminPass) {
            alert("初回設定を行います。");
            webhookUrl = prompt("通知用Webhook URLを入力してください:");
            adminPass = prompt("管理者パスワード（リセット用）を設定してください:");
            if (!webhookUrl || !adminPass) return alert("設定が不完全です");
            localStorage.setItem('omikuji_webhook_url', webhookUrl);
            localStorage.setItem('omikuji_admin_pass', adminPass);
        }

        if (!checkCooldown()) return;

        localStorage.setItem('omikuji_name', name);
        const fortunes = ["大吉", "中吉", "小吉", "吉", "末吉", "凶"];
        const result = fortunes[Math.floor(Math.random() * fortunes.length)];

        document.getElementById('result').innerText = "抽選中...";
        
        setTimeout(async () => {
            document.getElementById('result').innerHTML = `結果：<span style="color:#e63946">${result}</span>`;
            localStorage.setItem('omikuji_last_time', new Date().getTime().toString());
            
            await sendToWebhook(webhookUrl, name, result);
            checkCooldown();
        }, 1000);
    }

    // 3. Webhook送信
    async function sendToWebhook(url, name, result) {
        try {
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: `🔮 **${name}** さんの運勢は **【${result}】** でした！` })
            });
        } catch (e) { console.error("Webhook Error"); }
    }

    // 4. 隠しリセット機能（5回連打 + パスワード）
    function handleSecretTap() {
        tapCount++;
        clearTimeout(tapTimer);
        
        if (tapCount >= 5) {
            const savedPass = localStorage.getItem('omikuji_admin_pass');
            const inputPass = prompt("管理者パスワードを入力してください:");
            
            if (savedPass && inputPass === savedPass) {
                if (confirm("全データを削除して初期化しますか？")) {
                    localStorage.clear();
                    location.reload();
                }
            } else {
                alert("認証失敗または設定がありません。");
            }
            tapCount = 0;
        } else {
            tapTimer = setTimeout(() => { tapCount = 0; }, 2000);
        }
    }
</script>

</body>
</html>
